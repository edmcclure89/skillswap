<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0A0F" />

    <!-- SEO + Legal Meta Tags -->
    <meta name="description" content="Find and hire trusted freelancers and local service providers for design, marketing, development, and business services." />
    <meta name="keywords" content="freelance services, hire freelancers, local services marketplace, design, marketing, development, consulting, skill swap, skill trading" />
    <meta name="author" content="SkillSwap" />
    <meta name="copyright" content="&copy; 2026 SkillSwap" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="SkillSwap - Hire Trusted Freelancers" />
    <meta property="og:description" content="Browse and hire skilled professionals across multiple service categories." />
    <meta property="og:type" content="website" />

    <!-- Geo -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="United States" />

    <!-- Apple / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <title>SkillSwap</title>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Marketplace",
      "name": "SkillSwap",
      "description": "Marketplace to trade skills and hire freelancers and service providers",
      "areaServed": "Global",
      "serviceType": ["Design", "Marketing", "Development", "Consulting", "Writing", "Finance", "Tech"]
    }
    </script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: transparent;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -webkit-text-size-adjust: 100%;
      }
      input, button, textarea, select {
        font-size: 16px;
      }
      button {
        min-height: 44px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
